<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Listing Submission Success</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#edae1d",
              "background-light": "#f8f7f6",
              "background-dark": "#050505", // Deep black as requested
              "surface-dark": "#121212",
              "gold-dim": "#b9b19d",
            },
            fontFamily: {
              "display": ["Public Sans", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            backgroundImage: {
              'gold-gradient': 'linear-gradient(to bottom, rgba(237, 174, 29, 0.15), transparent)',
              'sparkle-pattern': 'radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px), radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px), radial-gradient(rgba(255,255,255,.1), rgba(255,255,255,.1) 2px, transparent 3px)'
            }
          },
        },
      }
    </script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        /* Custom Sparkle Effect */
        .sparkle-bg {
            background-image: 
                radial-gradient(#edae1d 1px, transparent 1px), 
                radial-gradient(#edae1d 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            opacity: 0.2;
            mask-image: linear-gradient(to bottom, black, transparent);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center overflow-hidden relative text-white antialiased">
<!-- Top Status Bar Area (Mock) -->
<div class="absolute top-0 left-0 right-0 h-12 z-20 flex justify-between items-end px-6 pb-2">
<span class="text-xs font-medium">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[16px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[16px]">wifi</span>
<span class="material-symbols-outlined text-[16px]">battery_full</span>
</div>
</div>
<!-- Background Effects -->
<div class="absolute inset-x-0 top-0 h-1/3 bg-gold-gradient pointer-events-none z-0"></div>
<div class="absolute inset-x-0 top-0 h-64 sparkle-bg pointer-events-none z-0"></div>
<!-- Close Button -->
<button class="absolute top-12 left-6 z-20 text-white/80 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl">close</span>
</button>
<!-- Main Content Container -->
<main class="w-full max-w-md flex flex-col items-center px-6 relative z-10 pt-20 pb-8 flex-1">
<!-- Header Section -->
<div class="text-center mb-10 animate-[fadeIn_0.6s_ease-out]">
<div class="mx-auto mb-6 bg-primary/10 w-20 h-20 rounded-full flex items-center justify-center ring-1 ring-primary/30 shadow-[0_0_15px_rgba(237,174,29,0.2)]">
<span class="material-symbols-outlined text-primary text-5xl">verified</span>
</div>
<h1 class="text-primary tracking-wider text-2xl font-extrabold uppercase leading-tight mb-3 drop-shadow-sm">Verification Submitted</h1>
<p class="text-gray-400 text-sm font-light leading-relaxed max-w-[280px] mx-auto">
                Your listing is now under review by our concierge team for quality assurance.
            </p>
</div>
<!-- Listing Preview Card -->
<div class="w-full bg-surface-dark rounded-xl overflow-hidden shadow-2xl border border-white/10 mb-8 group relative animate-[slideUp_0.8s_ease-out]">
<!-- Pending Ribbon -->
<div class="absolute top-4 left-4 z-20 bg-primary/90 backdrop-blur-sm px-3 py-1 rounded text-[#050505] text-[10px] font-bold tracking-widest uppercase shadow-lg">
                Pending Review
            </div>
<!-- Image Container -->
<div class="relative w-full aspect-[4/3] overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent z-10"></div>
<img alt="Luxury modern mansion with pool at dusk" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" data-alt="Luxury modern mansion with pool at dusk" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAKyP0PvgItOsJyWdH21z_7RXCY1c0coQbP11NhIiUkk3EwMt6spJ18EaQ_wIzgBM6oY_E9IbHz9F_tEON3A5GV1iwzTNKhjnIy7rg4zd3srIOcE__FngkuMYo3kNqiXv7OH-L8QGr-Q7NvDhfbvbIMkf27GhrlHNxB-fhimxtU3Kh38EPt_bZQIBFYs-w44-ljXwtHblwjSdD7Fx7_fFZaUhkRzO5u0WaNLsXO4quc4kNwaxmP7H7R6OZnRWqc8LcxKsujubN7UOU"/>
</div>
<!-- Card Details -->
<div class="p-5 relative z-20 -mt-16">
<div class="flex flex-col gap-1">
<p class="text-white text-2xl font-bold tracking-tight">$5,400,000</p>
<div class="flex items-center gap-1 text-gray-300">
<span class="material-symbols-outlined text-primary text-sm">location_on</span>
<p class="text-sm font-medium">1200 Pacific Coast Hwy, Malibu</p>
</div>
</div>
<!-- Quick Stats Grid -->
<div class="grid grid-cols-3 gap-2 mt-4 pt-4 border-t border-white/10">
<div class="flex flex-col items-center">
<span class="text-xs text-gray-500 uppercase tracking-wide">Beds</span>
<span class="text-sm font-semibold text-white">5</span>
</div>
<div class="flex flex-col items-center border-l border-white/10">
<span class="text-xs text-gray-500 uppercase tracking-wide">Baths</span>
<span class="text-sm font-semibold text-white">6.5</span>
</div>
<div class="flex flex-col items-center border-l border-white/10">
<span class="text-xs text-gray-500 uppercase tracking-wide">Sq Ft</span>
<span class="text-sm font-semibold text-white">4,200</span>
</div>
</div>
</div>
</div>
<!-- Share Section -->
<div class="w-full mb-auto animate-[fadeIn_1s_ease-out]">
<h3 class="text-xs font-bold text-gray-500 uppercase tracking-[0.15em] text-center mb-4">Share Exclusive Preview</h3>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center gap-2 p-3 rounded-lg border border-primary/30 bg-surface-dark hover:bg-primary/5 transition-all group">
<span class="material-symbols-outlined text-primary text-xl group-hover:scale-110 transition-transform">content_copy</span>
<span class="text-[10px] font-bold text-primary tracking-wider">COPY</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-3 rounded-lg border border-primary/30 bg-surface-dark hover:bg-primary/5 transition-all group">
<span class="material-symbols-outlined text-primary text-xl group-hover:scale-110 transition-transform">chat</span>
<span class="text-[10px] font-bold text-primary tracking-wider">WHATSAPP</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-3 rounded-lg border border-primary/30 bg-surface-dark hover:bg-primary/5 transition-all group">
<span class="material-symbols-outlined text-primary text-xl group-hover:scale-110 transition-transform">photo_camera</span>
<span class="text-[10px] font-bold text-primary tracking-wider">INSTAGRAM</span>
</button>
</div>
</div>
<!-- Sticky Footer Action -->
<div class="w-full mt-8 animate-[slideUp_1.2s_ease-out]">
<button class="w-full bg-primary hover:bg-[#d69d1a] text-background-dark font-bold text-sm tracking-widest uppercase py-4 rounded-lg shadow-[0_4px_20px_rgba(237,174,29,0.3)] transition-all active:scale-[0.98]">
                Return to Dashboard
            </button>
</div>
</main>
<!-- Global Keyframe Animations needed for the reveal effect -->
<style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body></html>
