<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Luxury New Listing Entry - ProperteeHub</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Theme Configuration -->
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#edae1d",
                        "background-light": "#f8f7f6",
                        "background-dark": "#0a0a0a", // Deepest black as requested
                        "card-dark": "#141414", // Slightly lighter for cards/inputs
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hide for cleaner UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased selection:bg-primary selection:text-black">
<div class="relative flex min-h-screen w-full flex-col overflow-hidden max-w-md mx-auto shadow-2xl">
<!-- Background decorative elements for luxury feel -->
<div class="absolute top-0 right-0 -mt-20 -mr-20 w-80 h-80 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute bottom-0 left-0 -mb-20 -ml-20 w-60 h-60 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<!-- Header -->
<header class="flex items-center justify-between p-6 z-10">
<button class="text-white/60 hover:text-white transition-colors flex items-center justify-center p-2 -ml-2 rounded-full hover:bg-white/5">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
<h2 class="text-white text-sm font-bold tracking-[0.15em] uppercase text-center">New Listing</h2>
<button class="text-primary text-sm font-bold tracking-wide hover:text-primary/80 transition-colors">HELP</button>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-6 pb-24 z-10 overflow-y-auto no-scrollbar">
<!-- Progress Stepper -->
<div class="flex flex-col gap-2 mb-8">
<div class="flex justify-between items-end mb-2">
<span class="text-primary font-bold text-xs tracking-widest uppercase">Step 1 of 4</span>
<span class="text-white/40 text-[10px] uppercase tracking-wider font-medium">Visual Identity</span>
</div>
<!-- Progress Bar -->
<div class="h-1 w-full bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary/80 to-primary w-1/4 rounded-full shadow-[0_0_10px_rgba(237,174,29,0.5)]"></div>
</div>
</div>
<!-- Title Section -->
<div class="mb-8 text-center">
<h1 class="text-3xl font-light text-white mb-2">Showcase Your Asset</h1>
<p class="text-white/40 text-sm font-light">The visual centerpiece of your listing.</p>
</div>
<!-- Upload Area (Hero) -->
<div class="relative group cursor-pointer mb-10">
<div class="absolute -inset-0.5 bg-gradient-to-b from-primary/50 to-transparent rounded-xl opacity-50 group-hover:opacity-100 transition duration-500 blur-[1px]"></div>
<div class="relative flex flex-col items-center justify-center aspect-[4/3] w-full rounded-xl bg-card-dark border border-primary/30 border-dashed group-hover:border-primary group-hover:bg-[#1a1812] transition-all duration-300">
<!-- Inner Content -->
<div class="flex flex-col items-center gap-4 p-6 text-center">
<div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center text-primary mb-2 group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-[32px]">add_a_photo</span>
</div>
<div class="space-y-1">
<h3 class="text-white font-medium text-lg">Upload Visuals</h3>
<p class="text-white/40 text-xs max-w-[200px] mx-auto leading-relaxed">High-resolution imagery preferred. Tap to browse library.</p>
</div>
</div>
</div>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-6">
<!-- Property Title -->
<div class="group relative">
<label class="block text-white/50 text-[10px] font-bold tracking-[0.1em] uppercase mb-2 ml-1 group-focus-within:text-primary transition-colors">Property Title</label>
<div class="relative">
<input class="block w-full rounded-lg bg-card-dark border-0 ring-1 ring-white/10 text-white placeholder:text-white/20 focus:ring-1 focus:ring-primary/60 focus:bg-[#1a1812] py-4 px-4 text-base transition-all duration-300 shadow-sm" placeholder="e.g. The Obsidian Villa" type="text"/>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-white/20 group-focus-within:text-primary/50">
<span class="material-symbols-outlined text-[20px]">edit</span>
</div>
</div>
</div>
<!-- Price -->
<div class="group relative">
<label class="block text-white/50 text-[10px] font-bold tracking-[0.1em] uppercase mb-2 ml-1 group-focus-within:text-primary transition-colors">Price (USD)</label>
<div class="relative">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-white/40 group-focus-within:text-primary">
<span class="material-symbols-outlined text-[20px]">attach_money</span>
</div>
<input class="block w-full rounded-lg bg-card-dark border-0 ring-1 ring-white/10 text-white placeholder:text-white/20 focus:ring-1 focus:ring-primary/60 focus:bg-[#1a1812] py-4 pl-12 pr-4 text-base transition-all duration-300 shadow-sm" placeholder="4,500,000" type="text"/>
</div>
</div>
<!-- Location -->
<div class="group relative">
<label class="block text-white/50 text-[10px] font-bold tracking-[0.1em] uppercase mb-2 ml-1 group-focus-within:text-primary transition-colors">Location</label>
<div class="relative">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-white/40 group-focus-within:text-primary">
<span class="material-symbols-outlined text-[20px]">location_on</span>
</div>
<input class="block w-full rounded-lg bg-card-dark border-0 ring-1 ring-white/10 text-white placeholder:text-white/20 focus:ring-1 focus:ring-primary/60 focus:bg-[#1a1812] py-4 pl-12 pr-4 text-base transition-all duration-300 shadow-sm" placeholder="e.g. Beverly Hills, CA" type="text"/>
</div>
</div>
</div>
</main>
<!-- Sticky Footer Action -->
<div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-dark via-background-dark to-transparent z-20 max-w-md mx-auto">
<button class="w-full bg-primary hover:bg-yellow-500 text-black font-bold text-sm tracking-[0.1em] uppercase py-4 rounded-lg shadow-[0_4px_20px_rgba(237,174,29,0.3)] hover:shadow-[0_4px_25px_rgba(237,174,29,0.5)] transition-all duration-300 transform active:scale-[0.98] flex items-center justify-center gap-2">
<span>Next Step</span>
<span class="material-symbols-outlined text-[18px] font-bold">arrow_forward</span>
</button>
</div>
</div>
</body></html>
