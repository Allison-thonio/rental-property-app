<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ProperteeHub | Advanced Filters</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">

            darkMode: "class",

                    colors: {
                        "primary": "#edae1d",
                        "background-light": "#f8f7f6",
                        "background-dark": "#221c10",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .glass-overlay {
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(237, 174, 29, 0.3);
            border-radius: 10px;
        }
        .chip-active {
            background-color: #edae1d;

        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<!-- Advanced Filters Overlay -->
<div class="fixed inset-0 z-50 glass-overlay flex flex-col">
<!-- Header -->
<header class="flex items-center justify-between px-6 py-8 border-b border-primary/10">
<button class="p-2 -ml-2 text-white hover:text-primary transition-colors">
<span class="material-icons">close</span>
</button>
<h1 class="text-primary font-extrabold tracking-[0.2em] text-sm md:text-base">REFINE SEARCH</h1>
<button class="text-[10px] font-bold tracking-widest text-primary/60 hover:text-primary">RESET</button>
</header>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto custom-scrollbar px-6 py-8 space-y-12">
<!-- Price Range -->
<section>
<div class="flex justify-between items-end mb-6">
<label class="text-[10px] font-bold tracking-[0.2em] text-white/50">PRICE RANGE</label>
<span class="text-sm font-medium text-primary">$2.5M - $18M+</span>
</div>
<div class="relative h-1 bg-primary/20 rounded-full mb-8">

<div class="absolute w-5 h-5 bg-primary rounded-full top-1/2 -translate-y-1/2 left-1/4 -ml-2.5 shadow-[0_0_15px_rgba(237,174,29,0.5)] cursor-pointer"></div>
<div class="absolute w-5 h-5 bg-primary rounded-full top-1/2 -translate-y-1/2 right-1/4 -mr-2.5 shadow-[0_0_15px_rgba(237,174,29,0.5)] cursor-pointer"></div>

<div class="flex flex-wrap gap-3">
<div class="px-5 py-2.5 rounded border border-primary text-[11px] font-bold tracking-widest chip-active cursor-pointer">PENTHOUSE</div>
<div class="px-5 py-2.5 rounded border border-primary/30 text-[11px] font-bold tracking-widest text-white/70 hover:border-primary/60 cursor-pointer">VILLA</div>
<div class="px-5 py-2.5 rounded border border-primary/30 text-[11px] font-bold tracking-widest text-white/70 hover:border-primary/60 cursor-pointer">ESTATE</div>
<div class="px-5 py-2.5 rounded border border-primary/30 text-[11px] font-bold tracking-widest text-white/70 hover:border-primary/60 cursor-pointer">MANSION</div>
<div class="px-5 py-2.5 rounded border border-primary/30 text-[11px] font-bold tracking-widest text-white/70 hover:border-primary/60 cursor-pointer">LOFT</div>
</div>
</section>
<!-- Bedrooms & Bathrooms -->
<section class="grid grid-cols-2 gap-8">
<div>
<label class="text-[10px] font-bold tracking-[0.2em] text-white/50 block mb-6">BEDROOMS</label>
<div class="flex items-center bg-white/5 rounded p-1">
<button class="flex-1 py-2 text-xs font-bold text-white/40">1+</button>
<button class="flex-1 py-2 text-xs font-bold text-white/40">2+</button>
<button class="flex-1 py-2 text-xs font-bold bg-primary text-background-dark rounded shadow-lg">3+</button>
<button class="flex-1 py-2 text-xs font-bold text-white/40">4+</button>
</div>
</div>
<div>
<label class="text-[10px] font-bold tracking-[0.2em] text-white/50 block mb-6">BATHROOMS</label>
<div class="flex items-center bg-white/5 rounded p-1">
<button class="flex-1 py-2 text-xs font-bold text-white/40">1+</button>
<button class="flex-1 py-2 text-xs font-bold bg-primary text-background-dark rounded shadow-lg">2+</button>
<button class="flex-1 py-2 text-xs font-bold text-white/40">3+</button>
<button class="flex-1 py-2 text-xs font-bold text-white/40">4+</button>
</div>
</div>
</section>
<!-- Amenities -->
<section>
<label class="text-[10px] font-bold tracking-[0.2em] text-white/50 block mb-6">PREMIUM AMENITIES</label>
<div class="space-y-4">
<label class="flex items-center justify-between group cursor-pointer">
<span class="text-sm font-medium text-white/80 group-hover:text-white transition-colors">PRIVATE POOL</span>
<div class="w-5 h-5 rounded border-2 border-primary bg-primary flex items-center justify-center">
<span class="material-icons text-background-dark text-[14px] font-bold">check</span>
</div>
</label>
<div class="h-[1px] bg-primary/5"></div>
<label class="flex items-center justify-between group cursor-pointer">
<span class="text-sm font-medium text-white/80 group-hover:text-white transition-colors">HELIPAD ACCESS</span>
<div class="w-5 h-5 rounded border-2 border-white/20 hover:border-primary/50 transition-colors"></div>
</label>
<div class="h-[1px] bg-primary/5"></div>
<label class="flex items-center justify-between group cursor-pointer">

<div class="w-5 h-5 rounded border-2 border-primary bg-primary flex items-center justify-center">
<span class="material-icons text-background-dark text-[14px] font-bold">check</span>
</div>
</label>
<div class="h-[1px] bg-primary/5"></div>
<label class="flex items-center justify-between group cursor-pointer">
<span class="text-sm font-medium text-white/80 group-hover:text-white transition-colors">SMART HOME SYSTEM</span>
<div class="w-5 h-5 rounded border-2 border-white/20 hover:border-primary/50 transition-colors"></div>
</label>
<div class="h-[1px] bg-primary/5"></div>
<label class="flex items-center justify-between group cursor-pointer">
<span class="text-sm font-medium text-white/80 group-hover:text-white transition-colors">WATERFRONT</span>
<div class="w-5 h-5 rounded border-2 border-white/20 hover:border-primary/50 transition-colors"></div>
</label>
<div class="h-[1px] bg-primary/5"></div>
<label class="flex items-center justify-between group cursor-pointer">
<span class="text-sm font-medium text-white/80 group-hover:text-white transition-colors">24/7 CONCIERGE</span>
<div class="w-5 h-5 rounded border-2 border-primary bg-primary flex items-center justify-center">
<span class="material-icons text-background-dark text-[14px] font-bold">check</span>
</div>
</label>
</div>
</section>
<!-- Spacer for bottom button -->
<div class="h-16"></div>
</div>
<!-- Footer Apply Button -->
<footer class="p-6 pb-10 bg-gradient-to-t from-black via-black/90 to-transparent">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark py-5 rounded-lg font-extrabold tracking-[0.2em] text-sm shadow-[0_10px_30px_rgba(237,174,29,0.3)] flex items-center justify-center space-x-3 transition-transform active:scale-[0.98]">
<span>APPLY FILTERS</span>
<span class="opacity-30">|</span>
<span>SHOW 12 PROPERTIES</span>
</button>
</footer>
</div>
