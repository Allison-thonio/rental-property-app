<div class="text-center space-y-3">
<h1 class="text-luxury-charcoal dark:text-white tracking-[0.2em] text-3xl md:text-4xl font-light uppercase hidden md:block">

                </h1>
<div class="h-[1px] w-24 bg-primary mx-auto hidden md:block"></div>
<h2 class="text-primary text-sm md:text-base font-bold tracking-[0.15em] uppercase pt-4">
                    Client Access
                </h2>
</div>
<!-- Form Section -->
<form class="space-y-8 mt-8" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="group">
<label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 tracking-widest mb-2 uppercase group-focus-within:text-primary transition-colors" for="email">
                        Email Address
                    </label>
<div class="relative">
<input class="block w-full px-4 py-4 bg-transparent border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-300 rounded-lg text-lg" id="email" name="email" placeholder="name@example.com" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-primary transition-colors pointer-events-none">
                            mail
                        </span>
</div>
</div>
<!-- Password Field -->
<div class="group">
<label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 tracking-widest mb-2 uppercase group-focus-within:text-primary transition-colors" for="password">
                        Password
                    </label>
<div class="relative">
<input class="block w-full px-4 py-4 bg-transparent border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-300 rounded-lg text-lg" id="password" name="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-primary transition-colors cursor-pointer hover:text-white">
                            visibility
                        </span>
</div>
</div>

<button class="w-full bg-primary hover:bg-[#d99b0b] text-white dark:text-luxury-black font-bold py-4 px-6 rounded-lg uppercase tracking-[0.15em] transition-all duration-300 shadow-lg hover:shadow-primary/20 transform hover:-translate-y-0.5 mt-8" type="submit">
                    Access ProperteeHub
                </button>
<!-- Secondary Actions -->
<div class="flex flex-col sm:flex-row justify-between items-center gap-4 pt-4 text-xs tracking-widest font-medium">
<a class="text-gray-500 dark:text-gray-400 hover:text-primary transition-colors uppercase border-b border-transparent hover:border-primary pb-0.5" href="#">
                        Forgot Password

<a class="text-gray-500 dark:text-gray-400 hover:text-primary transition-colors uppercase border-b border-transparent hover:border-primary pb-0.5" href="#">
