<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ProperteeHub - Interactive Global Map</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d9a630",
                        "background-light": "#f8f7f6",
                        "background-dark": "#171612",
                        "surface-dark": "#26231d",
                        "surface-darker": "#201c12",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hide for cleaner UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Gradient mask for map fading */
        .map-overlay-gradient {
            background: linear-gradient(to bottom, rgba(23, 22, 18, 0.8) 0%, rgba(23, 22, 18, 0) 20%, rgba(23, 22, 18, 0) 80%, rgba(23, 22, 18, 0.9) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background-light dark:bg-background-dark font-display text-white overflow-hidden h-screen w-full flex flex-col relative">

<div class="absolute inset-0 z-0 bg-surface-darker">

</div>
<!-- Map Overlay Gradient for better text readability at top/bottom -->
<div class="absolute inset-0 map-overlay-gradient pointer-events-none"></div>
<!-- Simulated Pins -->
<!-- Pin 1: Active -->
<div class="absolute top-[40%] left-[50%] -translate-x-1/2 -translate-y-1/2 flex flex-col items-center gap-1 cursor-pointer group">
<div class="bg-surface-dark/90 backdrop-blur-md px-3 py-1.5 rounded-lg border border-primary/30 shadow-lg transform transition-all scale-100 group-hover:scale-110">
<span class="text-primary font-bold text-xs whitespace-nowrap">$12.5M</span>
</div>
<div class="relative">
<div class="w-4 h-4 bg-primary rounded-full shadow-[0_0_15px_rgba(217,166,48,0.6)] border-2 border-white"></div>
<div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-0.5 h-3 bg-white"></div>
</div>
</div>
<!-- Pin 2: Inactive -->
<div class="absolute top-[30%] left-[25%] flex flex-col items-center gap-1 cursor-pointer opacity-80 hover:opacity-100 transition-opacity">
<div class="w-3 h-3 bg-surface-dark border-2 border-primary rounded-full shadow-md"></div>

</div>

</div>
</div>

<div class="flex gap-3 items-center">
<div class="flex-1 bg-surface-dark/80 backdrop-blur-xl border border-white/10 rounded-full h-12 flex items-center px-4 shadow-lg">
<span class="material-symbols-outlined text-gray-400 text-[20px]">search</span>
<input class="bg-transparent border-none focus:ring-0 text-sm text-white placeholder-gray-400 w-full ml-2 font-medium" placeholder="Search city, zip, or address..." type="text"/>
</div>
<button class="h-12 w-12 bg-surface-dark/80 backdrop-blur-xl border border-white/10 rounded-full flex items-center justify-center text-white shadow-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]">tune</span>
</button>
</div>
<!-- Filter Chips -->
<div class="flex gap-2 mt-3 overflow-x-auto no-scrollbar pb-2">
<button class="px-4 py-1.5 bg-primary text-background-dark text-xs font-bold rounded-full shadow-lg whitespace-nowrap">

                </button>
<button class="px-4 py-1.5 bg-surface-dark/80 backdrop-blur-md border border-white/10 text-gray-300 text-xs font-medium rounded-full shadow-lg whitespace-nowrap hover:bg-white/10 transition-colors">
                    Penthouse
                </button>
<button class="px-4 py-1.5 bg-surface-dark/80 backdrop-blur-md border border-white/10 text-gray-300 text-xs font-medium rounded-full shadow-lg whitespace-nowrap hover:bg-white/10 transition-colors">
                    Villa
                </button>
<button class="px-4 py-1.5 bg-surface-dark/80 backdrop-blur-md border border-white/10 text-gray-300 text-xs font-medium rounded-full shadow-lg whitespace-nowrap hover:bg-white/10 transition-colors">
                    Waterfront
                </button>
</div>
</div>
<!-- Spacer to push bottom content down -->
<div class="flex-1 relative pointer-events-auto">
<!-- Floating Action Buttons (Map Controls) -->
<div class="absolute right-4 top-4 flex flex-col gap-3">
<button class="h-10 w-10 bg-surface-dark/90 backdrop-blur-md border border-white/10 rounded-full flex items-center justify-center text-white shadow-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]">layers</span>
</button>
<button class="h-10 w-10 bg-surface-dark/90 backdrop-blur-md border border-white/10 rounded-full flex items-center justify-center text-white shadow-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]">my_location</span>
</button>
</div>
</div>
<!-- Bottom Sheet / Property Card -->
<div class="px-4 pb-24 pointer-events-auto">
<!-- Selected Property Card -->
<div class="bg-surface-dark/95 backdrop-blur-2xl border border-white/5 rounded-2xl p-3 shadow-2xl flex gap-3 items-stretch animate-in slide-in-from-bottom-10 fade-in duration-500">
<!-- Image -->
<div class="w-28 h-28 flex-shrink-0 rounded-xl overflow-hidden relative">
<div class="absolute top-2 left-2 bg-black/50 backdrop-blur-sm px-1.5 py-0.5 rounded text-[10px] font-bold text-white uppercase tracking-wider">New</div>
<img alt="Luxury modern penthouse interior with large windows" class="w-full h-full object-cover" data-alt="Interior of a luxury penthouse with floor to ceiling windows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC4pcTUJmbHvW_UbHv09jvOoP58sMxdur_F_SYgqbTwdqAVXtVNaDmm_szYequwnUM8sHE8qfjtFpHF7ddHwHAB3iZiU6_HvR08WFfNNwDe7RHvpp5b_eC2dKOR6vdTH5rdj_XSv7MyuI4_JR1qXUeDjRXJS5kJ8QtF4xfenWo-TR1mAmfzHche2vdSi8sSLW30Wbp7ITNRlCs9cj4l5cXSfnf0XkdL3w3eJVFhPc4F53aHWucjPWdtCMCMxAt4zNcvlWXDotl17f8"/>

<div>
<div class="flex justify-between items-start">
<div>

<p class="text-gray-400 text-xs font-medium mt-0.5">London, UK</p>
</div>
<div class="h-8 w-8 rounded-full border border-white/10 flex items-center justify-center text-gray-400 hover:text-red-500 transition-colors cursor-pointer">
<span class="material-symbols-outlined text-[18px]">favorite</span>
</div>
</div>
<div class="mt-2 text-primary font-bold text-lg">$12,500,000</div>
</div>
<div class="flex items-center justify-between mt-2">
<div class="flex gap-3 text-gray-400 text-[11px] font-medium">
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">bed</span> 3</span>
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">bathtub</span> 4</span>
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">square_foot</span> 2,400</span>
</div>
<button class="h-8 w-8 bg-primary rounded-full flex items-center justify-center text-background-dark shadow-[0_0_10px_rgba(217,166,48,0.4)] active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation Bar -->
<div class="absolute bottom-0 left-0 right-0 bg-surface-dark/80 backdrop-blur-xl border-t border-white/5 pb-6 pt-2 px-6 flex justify-between items-end pointer-events-auto">
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="h-8 w-12 rounded-full flex items-center justify-center bg-primary/20 text-primary transition-colors">
<span class="material-symbols-outlined text-[24px] font-variation-settings-'FILL'1">map</span>
</div>
<span class="text-[10px] font-medium text-primary">Map</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="h-8 w-12 rounded-full flex items-center justify-center text-gray-400 group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-[24px]">format_list_bulleted</span>
</div>
<span class="text-[10px] font-medium text-gray-400 group-hover:text-white transition-colors">List</span>

<a class="flex flex-col items-center gap-1 group" href="#">
